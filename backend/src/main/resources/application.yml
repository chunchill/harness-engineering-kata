spring:
  application:
    name: harness-kata-backend
  flyway:
    enabled: false
  datasource:
    url: jdbc:h2:mem:kata;DB_CLOSE_DELAY=-1
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
server:
  port: 8080

wechat:
  app-id: ${WECHAT_APP_ID:}
  app-secret: ${WECHAT_APP_SECRET:}
  redirect-uri: ${WECHAT_REDIRECT_URI:}
  frontend-redirect-uri: ${WECHAT_FRONTEND_REDIRECT_URI:http://localhost:5180/}

# Structured logging (RULES.md): time level logger message
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %level [%logger] %msg%n"
